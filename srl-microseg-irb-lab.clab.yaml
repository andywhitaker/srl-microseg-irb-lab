name: srl-microseg-irb-lab
prefix: ""

topology:
  nodes:
    srl1:
      kind: nokia_srlinux
      type: ixr-d2l
      image: ghcr.io/nokia/srlinux:26.3.1
      startup-config: startup/srl1.json
    srl2:
      kind: nokia_srlinux
      type: ixr-d2l
      image: ghcr.io/nokia/srlinux:26.3.1
      startup-config: startup/srl2.json
    blue-1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.1.1/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.1.254
    red-1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.1.2/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.1.254
    blue-2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.2.1/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.2.254
    red-2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.2.2/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.2.254
    blue-3:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.1.3/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.1.254
    red-3:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.1.4/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.1.254
    blue-4:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.2.3/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.2.254
    red-4:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip addr add 192.168.2.4/24 dev eth1
        - ip route add 192.168.0.0/16 dev eth1 via 192.168.2.254

  links:
    - endpoints: [ "srl1:e1-1", "srl2:e1-1" ]
    - endpoints: [ "srl1:e1-2", "blue-1:eth1" ]
    - endpoints: [ "srl1:e1-3", "red-1:eth1" ]
    - endpoints: [ "srl2:e1-2", "blue-3:eth1" ]
    - endpoints: [ "srl2:e1-3", "red-3:eth1" ]
    - endpoints: [ "srl1:e1-4", "blue-2:eth1" ]
    - endpoints: [ "srl1:e1-5", "red-2:eth1" ]
    - endpoints: [ "srl2:e1-4", "blue-4:eth1" ]
    - endpoints: [ "srl2:e1-5", "red-4:eth1" ]
